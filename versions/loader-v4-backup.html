<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="yourturn-loader" content="4">
  <title>YourTurn</title>
</head>
<body style="font-family:system-ui;background:#F6F1E8;color:#102033;display:grid;place-items:center;min-height:100vh;margin:0">
  <div id="loading">YourTurn wird geladen…</div>
  <script type="module">
    const endpoint = 'https://hvjvcdhknqajoyjudweg.supabase.co/functions/v1/yourturn-app?v=9';
    try {
      const response = await fetch(endpoint, { cache: 'no-store' });
      if (!response.ok) throw new Error('Serverfehler ' + response.status);

      let wrapper = await response.text();
      const target = 'document.open();document.write(h);document.close()';
      const replacement = `const fixed=h.replace('</body>','<script>window.openDashboard=function(){location.href=location.origin+location.pathname+"?dashboard="+Date.now()};window.doCreateFromDashboard=function(){const e=document.getElementById("dashboard-tripname");if(e)e.dispatchEvent(new KeyboardEvent("keydown",{key:"Enter",bubbles:true}))};<\\/script></body>');document.open();document.write(fixed);document.close()`;

      if (!wrapper.includes(target)) {
        throw new Error('App-Patch konnte nicht angewendet werden');
      }

      wrapper = wrapper.replace(target, replacement);
      document.open();
      document.write(wrapper);
      document.close();
    } catch (error) {
      document.getElementById('loading').textContent = 'YourTurn konnte nicht geladen werden: ' + error.message;
    }
  </script>
</body>
</html>
